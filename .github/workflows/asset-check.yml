name: Asset & tests

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Verify referenced assets exist
        run: pnpm run verify-assets
      - name: Block cache and large files
        run: pnpm run check:large-files
      - name: Run unit tests
        run: pnpm test -- --runInBand
